<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;980&quot;}}">
class Component extends DCLogic {
  h = React.createElement;

  state = { ready:false, user:null, tab:'plan', fstatus:'all', fproject:null, sheet:null, items:null, owners:null, addOpen:false, form:{}, tlProject:null, tlOwner:null, tlType:'all', tlStatus:'all', docs:[], docProject:null, loginForm:{email:'',pwd:''}, msgs:null, channel:'general', msgInput:'', createOpen:false, cform:null, viewDoc:null, docCreate:null, docForm:null, shareId:null };

  componentDidMount(){ this._wait();
    try{ const u=localStorage.getItem('mnd_plan_user'); if(u) this.setState({user:JSON.parse(u)});
      const d=localStorage.getItem('mnd_plan_docs_v2'); if(d) this._savedDocs=JSON.parse(d);
      const m=localStorage.getItem('mnd_plan_msgs'); if(m) this._savedMsgs=JSON.parse(m); }catch(e){} }
  _wait(){ if(window.GANTT){ this.G=window.GANTT; this.setState({ ready:true, items: window.GANTT.ITEMS.map(o=>Object.assign({},o,{deps:(o.deps||[]).slice()})), owners: Object.assign({}, window.GANTT.OWNERS), docs: this._savedDocs || this.seedDocs(), msgs: this._savedMsgs || (window.GX?window.GX.seedMessages():{}) }); } else { setTimeout(()=>this._wait(),30); } }

  seedDocs(){ return [
    { id:'d0', kind:'letter', name:'Lettre — Confirmation RDV (Naïma T.)', ref:'LT-MND-2026-0012', to:'Madame Naïma T.', toSub:'Paris · France', object:'Confirmation de votre rendez-vous de création', date:'2026-06-25', project:'p2', who:'yeman', signer:'Yéman Ahouansou', signerRole:'Co-fondatrice · Soin & Transmission',
      body:'Chère Naïma,\n\nLa Maison MND a le plaisir de vous confirmer votre rendez-vous de création de microlocks, fixé aux 3 et 4 juillet 2026, à notre salon de Cotonou.\n\nDepuis plus de 20 ans, la Maison accompagne chaque cliente dans sa transformation — non comme une opération esthétique, mais comme un geste de souveraineté. Vous vous apprêtez à vivre un rituel rare : deux jours de création, un accompagnement sur mesure et un plan de soin adapté à votre cheveu.\n\nVous trouverez ci-joint votre devis N° DEV-2026-0018, ainsi que votre guide de préparation. Merci de nous confirmer votre acompte avant le 1er juillet.\n\nDans l’attente de vous accueillir à la Maison,' },
    { id:'d1', name:'Bail commercial — Cotonou.pdf', kind:'pdf', size:284000, date:'2026-02-10', project:'p2', who:'brice' },
    { id:'d2', name:'Brief shooting — Abibèko.docx', kind:'doc', size:54000, date:'2026-02-18', project:'p3', who:'yeman' },
    { id:'d3', name:'Formules Huile Couronne.xlsx', kind:'xls', size:31000, date:'2026-02-05', project:'p1', who:'adjoa' },
    { id:'d4', name:'Étiquette — verre teinté.png', kind:'img', size:1240000, date:'2026-02-16', project:'p1', who:'koffi' },
    { id:'d5', name:'Plans architecte — flagship.pdf', kind:'pdf', size:3680000, date:'2026-02-22', project:'p2', who:'koffi' }
  ]; }
  persistDocs(docs){ try{ localStorage.setItem('mnd_plan_docs_v2', JSON.stringify(docs.map(d=>{ const c=Object.assign({},d); delete c.url; return c; }))); }catch(e){} }
  fileKind(name,type){ const n=(name||'').toLowerCase(); if((type||'').startsWith('image')||/\.(png|jpe?g|gif|webp|svg)$/.test(n)) return 'img'; if(/\.pdf$/.test(n)) return 'pdf'; if(/\.(xlsx?|csv)$/.test(n)) return 'xls'; if(/\.(docx?|txt|rtf|pages)$/.test(n)) return 'doc'; if(/\.(pptx?|key)$/.test(n)) return 'ppt'; return 'file'; }
  fmtSize(b){ if(b<1024) return b+' o'; if(b<1048576) return Math.round(b/1024)+' Ko'; return (b/1048576).toFixed(1)+' Mo'; }
  todayISO(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
  onFiles(fileList){ const files=[...fileList]; if(!files.length) return; const adds=files.map((f,i)=>({ id:'u'+Date.now()+'_'+i, name:f.name, kind:this.fileKind(f.name,f.type), size:f.size, date:this.todayISO(), project:this.state.docProject||null, who:(this.state.user&&this.state.user.id)||null, url:(f.type||'').startsWith('image')?URL.createObjectURL(f):null }));
    this.setState(s=>{ const docs=adds.concat(s.docs); this.persistDocs(docs); return {docs}; }); }
  removeDoc(id){ this.setState(s=>{ const docs=s.docs.filter(d=>d.id!==id); this.persistDocs(docs); return {docs}; }); }

  // ---- create / view / share documents ----
  isFormal(d){ return d && ['letter','devis','facture','note'].indexOf(d.kind)!==-1; }
  docKindLabel(k){ return {letter:'Lettre',devis:'Devis',facture:'Facture',note:'Note interne'}[k]||''; }
  refPrefix(t){ return {letter:'LT',devis:'DEV',facture:'FAC',note:'NOTE'}[t]||'DOC'; }
  nextRef(t){ const p=this.refPrefix(t); const n=(this.state.docs.filter(d=>d.kind===t).length)+13; return p+'-MND-2026-'+String(n).padStart(4,'0'); }
  docTemplate(t){ const u=(this.state.user&&this.state.user.name)||'Maison MND';
    const T={ letter:{ object:'Objet de la lettre', body:'Chère cliente,\n\nLa Maison MND a le plaisir de vous écrire au sujet de…\n\nDans l’attente de vous accueillir à la Maison,' },
      devis:{ object:'Devis — Création de locks', body:'Prestation : création de microlocks (2 jours)\nAccompagnement & plan de soin sur mesure\n\nMontant : 250 000 FCFA\nAcompte (40 %) : 100 000 FCFA\n\nDevis valable 30 jours.' },
      facture:{ object:'Facture — Prestation de soin', body:'Prestation réalisée : entretien & soin couronne\nDate : '+this.fmt(this.todayISO())+'\n\nMontant total : 45 000 FCFA\nRéglé par Mobile Money.\n\nMerci de votre confiance.' },
      note:{ object:'Note interne', body:'À l’attention de l’équipe,\n\n…' } };
    return T[t]||T.note; }
  startCreateDoc(){ this.setState({docCreate:'menu'}); }
  pickTemplate(t){ const tpl=this.docTemplate(t); this.setState({docCreate:{type:t}, docForm:{ to:'', toSub:'', object:tpl.object, body:tpl.body, ref:this.nextRef(t), date:this.todayISO() }}); }
  setDForm(k,v){ this.setState(s=>({docForm:Object.assign({},s.docForm,{[k]:v})})); }
  makeDoc(){ const t=this.state.docCreate&&this.state.docCreate.type; const f=this.state.docForm||{}; if(!t) return; const obj=(f.object||'').trim()||this.docKindLabel(t);
    const id='doc'+Date.now(); const u=this.state.user||{}; 
    const doc={ id, kind:t, name:this.docKindLabel(t)+' — '+(f.to||obj), ref:f.ref, to:f.to, toSub:f.toSub, object:obj, body:f.body||'', date:f.date||this.todayISO(), project:this.state.docProject||null, who:u.id||null, signer:u.name||'Maison MND', signerRole:u.role||'Maison MND' };
    this.setState(s=>{ const docs=[doc].concat(s.docs); this.persistDocs(docs); return {docs, docCreate:null, docForm:null, viewDoc:id}; }); }
  openDoc(id){ this.setState({viewDoc:id}); }
  closeDoc(){ this.setState({viewDoc:null}); }
  openShare(id){ this.setState({shareId:id}); }
  shareText(d){ if(this.isFormal(d)){ return (this.docKindLabel(d.kind)+' — Maison MND')+'\n'+(d.ref?d.ref+'\n':'')+(d.object?'\nObjet : '+d.object+'\n':'')+'\n'+(d.body||'')+'\n\n— Maison MND · Cotonou'; } return 'Document : '+d.name+' ('+this.fmtSize(d.size)+') — Maison MND'; }
  doShare(method){ const d=this.state.docs.find(x=>x.id===this.state.shareId); if(!d){ this.setState({shareId:null}); return; }
    const text=this.shareText(d); const subject=(this.isFormal(d)?this.docKindLabel(d.kind)+' MND — '+(d.object||''):'Document MND — '+d.name);
    let url=''; if(method==='whatsapp') url='https://wa.me/?text='+encodeURIComponent(text);
    else if(method==='telegram') url='https://t.me/share/url?url='+encodeURIComponent('https://mnd.bj')+'&text='+encodeURIComponent(text);
    else if(method==='email') url='mailto:?subject='+encodeURIComponent(subject)+'&body='+encodeURIComponent(text);
    try{ const a=document.createElement('a'); a.href=url; a.target=method==='email'?'_self':'_blank'; a.rel='noopener'; document.body.appendChild(a); a.click(); a.remove(); }catch(e){ window.open(url,'_blank'); }
    this.setState({shareId:null}); }

  // ---- auth ----
  login(user){ try{ localStorage.setItem('mnd_plan_user', JSON.stringify(user)); }catch(e){} this.setState({user, tab:'plan'}); }
  loginEmail(){ const f=this.state.loginForm; const email=(f.email||'').trim(); if(!email) return; const name=email.split('@')[0].replace(/[._-]+/g,' ').replace(/\b\w/g,c=>c.toUpperCase()); this.login({ id:'me', name, role:'Maison MND', color:'var(--color-indigo)', email }); }
  logout(){ try{ localStorage.removeItem('mnd_plan_user'); }catch(e){} this.setState({user:null, tab:'plan'}); }

  // ---- messaging ----
  persistMsgs(msgs){ try{ localStorage.setItem('mnd_plan_msgs', JSON.stringify(msgs)); }catch(e){} }
  sendMsg(){ const txt=(this.state.msgInput||'').trim(); if(!txt) return; const ch=this.state.channel; const who=(this.state.user&&this.state.user.id)||'me';
    const now=new Date(); const t=now.toISOString().slice(0,16);
    this.setState(s=>{ const msgs=Object.assign({},s.msgs); msgs[ch]=(msgs[ch]||[]).concat([{who,t,text:txt,mine:true}]); this.persistMsgs(msgs); return {msgs, msgInput:''}; }); }
  msgTime(t){ try{ const d=new Date(t); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }catch(e){ return ''; } }
  msgDay(t){ const iso=(t||'').slice(0,10); return iso===this.G.TODAY?'Aujourd’hui':this.fmt(iso); }

  // ---- create project with smart suggestions ----
  openCreate(){ this.setState({ createOpen:true, cform:{ name:'', start:this.G.TODAY, sugg:null, label:null } }); }
  closeCreate(){ this.setState({createOpen:false}); }
  setCName(v){ this.setState(s=>{ const sg=window.GX?window.GX.suggest(v):{steps:[],label:''}; return { cform:Object.assign({},s.cform,{ name:v, sugg:sg.steps, label:sg.label }) }; }); }
  toggleSugg(i){ this.setState(s=>{ const sugg=s.cform.sugg.map((x,j)=>j===i?Object.assign({},x,{on:!x.on}):x); return {cform:Object.assign({},s.cform,{sugg})}; }); }
  createProject(){ const f=this.state.cform; const name=(f.name||'').trim(); if(!name){ this.setState({createOpen:false}); return; }
    const pid='p'+Date.now(); const owner=(this.state.user&&this.OW()[this.state.user.id])?this.state.user.id:Object.keys(this.OW())[0];
    const items=[{ id:pid, type:'project', name, parent:'g1', owner }];
    let cursor=f.start; const sel=(f.sugg||[]).filter(s=>s.on);
    sel.forEach((st,i)=>{ const start=cursor; const dur=Math.max(0,st.dur||0); const end=this.G.addDays(start, dur>0?dur-1:0);
      const tid=(st.type==='milestone'?'m':'t')+pid+'_'+i;
      items.push({ id:tid, type:st.type, name:st.name, parent:pid, owner, prio:'medium', start, end, progress:0, deps: i>0?[ (sel[i-1].type==='milestone'?'m':'t')+pid+'_'+(i-1) ]:[] });
      cursor=this.G.addDays(end, st.type==='milestone'?1:1); });
    this.setState(s=>({ items:s.items.concat(items), createOpen:false, tab:'tasks', fproject:pid, fstatus:'all' })); }

  // ---- data helpers ----
  byId(){ const m={}; this.state.items.forEach(i=>m[i.id]=i); return m; }
  cmap(){ const m={}; this.state.items.forEach(i=>{ const p=i.parent||'_root'; (m[p]=m[p]||[]).push(i); }); return m; }
  leaves(){ return this.state.items.filter(i=>i.start && i.type!=='goal' && i.type!=='project'); }
  projects(){ return this.state.items.filter(i=>i.type==='project'); }
  projOf(it){ let c=it; while(c && c.type!=='project'){ c=c.parent?this._byId[c.parent]:null; } return c; }
  roll(id){ const it=this._byId[id]; if(it.start) return {start:it.start,end:it.end,progress:it.progress||0,days:this.G.dayDiff(it.start,it.end)+1};
    const kids=(this._cm[id]||[]); let s=null,e=null,wp=0,wd=0; kids.forEach(k=>{ const r=this.roll(k.id); if(r.start){ if(!s||this.G.dayDiff(r.start,s)>0)s=r.start; if(!e||this.G.dayDiff(e,r.end)>0)e=r.end; wp+=r.progress*r.days; wd+=r.days; } }); return {start:s,end:e,progress:wd?Math.round(wp/wd):0,days:wd}; }
  statusOf(p){ return p>=100?'done':p<=0?'todo':p>=85?'review':'inprog'; }
  statusLabel(s){ return {todo:'À faire',inprog:'En cours',review:'Revue',done:'Terminé'}[s]; }
  prioColor(p){ return p==='high'?'var(--copper-500)':p==='medium'?'var(--indigo-400)':'var(--obsidian-300)'; }
  prioLabel(p){ return p==='high'?'Haute':p==='medium'?'Moyenne':'Basse'; }
  fmt(iso){ if(!iso) return '—'; const p=iso.split('-'); return (+p[2])+' '+['janv','févr','mars','avr','mai','juin','juil','août','sept','oct','nov','déc'][(+p[1])-1]; }
  daysTo(iso){ return this.G.dayDiff(this.G.TODAY, iso); }

  // ---- mutations ----
  setProgress(id,p){ this.setState(s=>({items:s.items.map(it=>it.id===id?Object.assign({},it,{progress:p}):it)})); }
  go(tab,extra){ this.setState(Object.assign({tab,sheet:null},extra||{})); }
  openTask(id){ this.setState({sheet:id}); }

  OW(){ return this.state.owners||this.G.OWNERS; }
  avatar(id,size,ring){ const h=this.h; const o=this.OW()[id]; if(!o) return null; const init=o.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    return h('div',{key:id,title:o.name,style:{width:size,height:size,borderRadius:'50%',background:o.color,color:'#F6F1E7',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:size*0.4,fontWeight:600,flex:'none',boxShadow: ring?'0 0 0 2px #FBF8F1':'none'}}, init); }

  ring(pct,size,stroke,track,color){ const h=this.h; const r=(size-stroke)/2; const c=2*Math.PI*r; const off=c*(1-pct/100);
    return h('svg',{width:size,height:size,viewBox:'0 0 '+size+' '+size,style:{transform:'rotate(-90deg)'}},
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:track,strokeWidth:stroke}),
      h('circle',{cx:size/2,cy:size/2,r,fill:'none',stroke:color,strokeWidth:stroke,strokeDasharray:c,strokeDashoffset:off,strokeLinecap:'round'})); }

  icon(name,active){ const h=this.h; const c=active?'var(--color-indigo)':'var(--obsidian-300)'; const sw=1.7;
    const p={ plan:'M4 5h7v6H4zM13 5h7v4h-7zM4 13h7v6H4zM13 11h7v8h-7z', tasks:'M4 6h2v2H4zM9 7h11M4 12h2v2H4zM9 13h11M4 18h2v2H4zM9 19h11', time:'M5 4h14a1 1 0 011 1v14a1 1 0 01-1 1H5a1 1 0 01-1-1V5a1 1 0 011-1zM4 9h16M8 3v3M16 3v3', messages:'M4 5h16a1 1 0 011 1v9a1 1 0 01-1 1H9l-4 4v-4H4a1 1 0 01-1-1V6a1 1 0 011-1zM8 9h8M8 12h5', docs:'M6 2h8l4 4v15a1 1 0 01-1 1H6a1 1 0 01-1-1V3a1 1 0 011-1zM13 2v5h5M8 13h8M8 17h6', team:'M9 11a3 3 0 100-6 3 3 0 000 6zM3 20a6 6 0 0112 0M17 11a3 3 0 10-1-5.8M16 14.5a6 6 0 015 5.5' };
    return h('svg',{width:23,height:23,viewBox:'0 0 24 24',fill:'none',stroke:c,strokeWidth:sw,strokeLinecap:'round',strokeLinejoin:'round'}, h('path',{d:p[name]})); }

  // ---- render ----
  renderVals(){ if(!this.state.ready) return { app: this.h('div',{style:{height:'100%',display:'grid',placeItems:'center',color:'#9AA0C4',letterSpacing:'.2em',fontSize:11}},'…') };
    this._byId=this.byId(); this._cm=this.cmap();
    const h=this.h; const s=this.state;
    if(!s.user) return { app: this.loginScreen() };
    const body = s.tab==='plan'?this.plan():s.tab==='tasks'?this.tasks():s.tab==='time'?this.timeline():s.tab==='messages'?this.messages():this.documents();
    const isChat = s.tab==='messages';
    return { app: h('div',{style:{minHeight:'100dvh',display:'flex',flexDirection:'column',background:'var(--color-ivoire)',position:'relative',maxWidth:480,margin:'0 auto'}},
      s.tab==='time'?null:this.motif(0.05),
      h('div',{className:'appscroll',style:{flex:1,minHeight:0,overflowY: isChat?'hidden':'auto',overflowX:'hidden',position:'relative',zIndex:1,display:isChat?'flex':'block',flexDirection:'column'}}, body),
      this.tabbar(),
      s.sheet?this.sheet():null,
      s.addOpen?this.addSheet():null,
      s.createOpen?this.createSheet():null,
      s.viewDoc?this.docViewer():null,
      s.docCreate?this.docCreateSheet():null,
      s.shareId?this.shareSheet():null
    ) }; }

  motif(op){ return this.h('div',{'aria-hidden':'true',style:{position:'absolute',inset:0,zIndex:0,pointerEvents:'none',backgroundImage:'url(assets/mono-indigo.png)',backgroundRepeat:'repeat',backgroundSize:'62px 62px',opacity:op}}); }

  topPad(){ return this.h('div',{style:{height:'max(16px, env(safe-area-inset-top))'}}); }

  // ---------- PLAN (home) ----------
  plan(){ const h=this.h; const overall=this.roll('g1'); const leaves=this.leaves(); const done=leaves.filter(l=>(l.progress||0)>=100).length; const projs=this.projects();
    const open=leaves.filter(l=>(l.progress||0)<100); const ahead=open.filter(l=>this.daysTo(l.end)>=0).sort((a,b)=>this.G.dayDiff(b.end,a.end)); const upcoming=ahead[0]||open.sort((a,b)=>this.G.dayDiff(b.end,a.end))[0];
    return h('div',null,
      // hero
      h('div',{style:{background:'var(--grad-indigo)',color:'var(--color-ivoire)',padding:'58px 22px 26px',borderBottomLeftRadius:26,borderBottomRightRadius:26,position:'relative',overflow:'hidden'}},
        h('img',{src:'assets/mono-ivoire.png',alt:'',style:{position:'absolute',top:-26,right:-34,width:210,height:210,opacity:.07,pointerEvents:'none'}}),
        h('div',{style:{display:'flex',alignItems:'center',gap:11,marginBottom:22,position:'relative'}},
          h('img',{src:'assets/mono-ivoire.png',alt:'MND',style:{width:30,height:30,objectFit:'contain'}}),
          h('div',{style:{fontWeight:600,fontSize:13,letterSpacing:'.34em'}},'MND'),
          h('div',{style:{width:1,height:13,background:'var(--hairline-invert)'}}),
          h('div',{style:{fontSize:9,letterSpacing:'.28em',color:'var(--copper-300)'}},'LE PLAN'),
          h('div',{style:{flex:1}}),
          h('button',{onClick:()=>this.logout(),title:'Se déconnecter — '+this.state.user.name,style:{display:'flex',alignItems:'center',gap:7,background:'rgba(246,241,231,.08)',border:'1px solid var(--hairline-invert)',borderRadius:'var(--radius-pill)',padding:'3px 10px 3px 3px',cursor:'pointer'}},
            h('div',{style:{width:24,height:24,borderRadius:'50%',background:this.state.user.color||'var(--copper-500)',color:'#F6F1E7',display:'grid',placeItems:'center',fontSize:10,fontWeight:600}}, this.state.user.name.split(' ').map(w=>w[0]).join('').slice(0,2)),
            h('span',{style:{fontSize:10.5,color:'var(--color-ivoire)',fontWeight:500}}, this.state.user.name.split(' ')[0]))),
        h('div',{style:{display:'flex',alignItems:'center',gap:20}},
          h('div',{style:{position:'relative',width:96,height:96,flex:'none'}}, this.ring(overall.progress,96,7,'rgba(246,241,231,.16)','var(--copper-400)'),
            h('div',{style:{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}},
              h('div',{style:{fontFamily:'var(--font-serif)',fontSize:30,fontWeight:300,lineHeight:1}},overall.progress+'%'),
