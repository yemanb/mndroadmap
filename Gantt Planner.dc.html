<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;100%&quot;},&quot;defaultTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dark&quot;,&quot;light&quot;],&quot;default&quot;:&quot;dark&quot;,&quot;tsType&quot;:&quot;'dark'|'light'&quot;,&quot;section&quot;:&quot;Affichage&quot;},&quot;defaultView&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;gantt&quot;,&quot;kanban&quot;,&quot;resources&quot;],&quot;default&quot;:&quot;gantt&quot;,&quot;tsType&quot;:&quot;'gantt'|'kanban'|'resources'&quot;,&quot;section&quot;:&quot;Affichage&quot;},&quot;defaultZoom&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;day&quot;,&quot;week&quot;,&quot;month&quot;,&quot;quarter&quot;,&quot;year&quot;],&quot;default&quot;:&quot;week&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Affichage&quot;},&quot;showCriticalPath&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Affichage&quot;},&quot;rowHeight&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:34,&quot;min&quot;:28,&quot;max&quot;:48,&quot;step&quot;:2,&quot;unit&quot;:&quot;px&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Densité&quot;}}">
class Component extends DCLogic {
  h = React.createElement;
  ROW = 34; HEADER = 54; LEFTW = 372;
  ZOOM = { day:{px:44,lab:'Jour'}, week:{px:15,lab:'Semaine'}, month:{px:6.4,lab:'Mois'}, quarter:{px:3.3,lab:'Trimestre'}, year:{px:1.55,lab:'Année'} };
  monFR = ['janv.','févr.','mars','avr.','mai','juin','juil.','août','sept.','oct.','nov.','déc.'];
  monShort = ['Jan','Fév','Mar','Avr','Mai','Juin','Juil','Aoû','Sep','Oct','Nov','Déc'];

  state = { ready:false, view:'gantt', zoom:'week', theme:'dark', collapsed:{}, selected:null, critical:true, exportOpen:false, items:null, hover:null, owners:null, modal:null, form:{}, msgs:null, channel:'general', msgInput:'', docs:[], docProject:null, viewDoc:null, docCreate:null, docForm:null, shareId:null };
  PALETTE = ['var(--indigo-500)','var(--copper-400)','var(--indigo-300)','var(--copper-600)','var(--obsidian-300)','var(--indigo-600)','var(--copper-500)','var(--indigo-400)'];

  componentDidMount(){ const p=this.props||{}; this.ROW = p.rowHeight||34;
    this.setState({ view:p.defaultView||'gantt', zoom:p.defaultZoom||'week', theme:p.defaultTheme||'dark', critical: p.showCriticalPath!==false });
    try{ const d=localStorage.getItem('mnd_plan_docs_v2'); if(d) this._savedDocs=JSON.parse(d); }catch(e){}
    this._wait(); }
  componentDidUpdate(prev){ const p=this.props||{}; if((prev||{}).rowHeight!==p.rowHeight && p.rowHeight){ this.ROW=p.rowHeight; } }
  _wait(){ if(window.GANTT){ this.G=window.GANTT; this.setState({ ready:true, items: window.GANTT.ITEMS.map(o=>Object.assign({}, o, {deps:(o.deps||[]).slice()})), owners: Object.assign({}, window.GANTT.OWNERS), msgs: window.GX?window.GX.seedMessages():{}, docs: this._savedDocs || this.seedDocs() }); } else { setTimeout(()=>this._wait(), 30); } }
  projects(){ return this.state.items.filter(i=>i.type==='project'); }
  OW(){ return this.state.owners || this.G.OWNERS; }

  // ---------- create entities ----------
  openModal(type,parent){ const G=this.G; const today=(G&&G.TODAY)||'2026-02-23'; const def={ name:'', role:'', owner: Object.keys(this.OW())[0]||'', prio:'medium', start: today, end: G?G.addDays(today,13):today };
    this.setState({ modal:{type,parent:parent||null}, form:def, exportOpen:false }); }
  closeModal(){ this.setState({ modal:null }); }
  setForm(k,v){ this.setState(s=>({ form: Object.assign({}, s.form, {[k]:v}) })); }
  setProjName(v){ this.setState(s=>{ const sg=window.GX?window.GX.suggest(v):{steps:[],label:''}; return { form: Object.assign({}, s.form, { name:v, sugg:sg.steps, suggLabel:sg.label }) }; }); }
  toggleSugg(i){ this.setState(s=>{ const sugg=(s.form.sugg||[]).map((x,j)=>j===i?Object.assign({},x,{on:!x.on}):x); return { form: Object.assign({}, s.form, {sugg}) }; }); }
  createEntity(){ const f=this.state.form, m=this.state.modal; if(!m) return; const name=(f.name||'').trim(); if(!name && m.type!=='owner') return;
    if(m.type==='owner'){ const nm=name||'Nouveau membre'; const id='o'+Date.now(); this.setState(s=>{ const owners=Object.assign({},s.owners); const cnt=Object.keys(owners).length; owners[id]={id,name:nm,role:(f.role||'Équipe'),color:this.PALETTE[cnt%this.PALETTE.length]}; return {owners, modal:null}; }); return; }
    const id=(m.type==='project'?'p':m.type==='subtask'?'s':'t')+Date.now();
    const base={ id, name, owner:f.owner||null };
    let item; const extra=[];
    if(m.type==='project'){ item=Object.assign(base,{type:'project',parent:'g1'});
      const sel=(f.sugg||[]).filter(x=>x.on); let cursor=f.start||((this.G&&this.G.TODAY)||'2026-02-23');

        extra.push({ id:tid, type:st.type, name:st.name, parent:id, owner:f.owner||null, prio:'medium', start, end, progress:0, deps: i>0?[(sel[i-1].type==='milestone'?'m':'t')+id+'_'+(i-1)]:[] }); cursor=this.G.addDays(end,1); });
      } else if(f.start&&f.end){ item.start=f.start; item.end=f.end; item.progress=0; } }
    else { item=Object.assign(base,{type:m.type,parent:m.parent,prio:f.prio||'medium',start:f.start,end:f.end,progress:0,deps:[]}); }
    this.setState(s=>{ const items=s.items.slice().concat([item]).concat(extra); const collapsed=Object.assign({},s.collapsed); if(m.parent) collapsed[m.parent]=false; return { items, modal:null, selected:id, collapsed }; });
  }

  // ---------- helpers ----------
  byId(){ const m={}; this.state.items.forEach(i=>m[i.id]=i); return m; }
  childrenMap(){ const m={}; this.state.items.forEach(i=>{ const p=i.parent||'_root'; (m[p]=m[p]||[]).push(i); }); return m; }
  depthOf(t){ return t==='goal'?0:t==='project'?1:(t==='task'||t==='milestone')?2:3; }

  roll(id, byId, cm, memo){ if(memo[id]) return memo[id]; const it=byId[id];
    if(it.start){ const d=this.G.dayDiff(it.start,it.end); return memo[id]={start:it.start,end:it.end,progress:it.progress||0,days:d+1}; }
    const kids=(cm[id]||[]); let s=null,e=null,wp=0,wd=0;
    kids.forEach(k=>{ const r=this.roll(k.id,byId,cm,memo); if(!s||this.G.dayDiff(r.start,s)>0)s=r.start; if(!e||this.G.dayDiff(e,r.end)>0)e=r.end; wp+=r.progress*r.days; wd+=r.days; });
    return memo[id]={start:s,end:e,progress: wd?Math.round(wp/wd):0, days:wd}; }

  geo(id){ const r=this.roll(id,this._byId,this._cm,this._roll); return r; }

  range(){ let mn=null,mx=null; this.state.items.forEach(i=>{ if(i.start){ if(!mn||this.G.dayDiff(i.start,mn)>0)mn=i.start; if(!mx||this.G.dayDiff(mx,i.end)>0)mx=i.end; } });
    return { start:this.G.addDays(mn,-4), end:this.G.addDays(mx,6) }; }
  px(){ return this.ZOOM[this.state.zoom].px; }
  x(iso){ return this.G.dayDiff(this._range.start, iso) * this.px(); }

  visibleRows(){ const cm=this._cm, out=[]; const walk=(id,depth)=>{ const it=this._byId[id]; out.push({item:it,depth}); if(this.state.collapsed[id]) return; (cm[id]||[]).forEach(k=>walk(k.id,depth+1)); };
    (cm['_root']||[]).forEach(r=>walk(r.id,0)); return out; }

  // CPM critical path over schedulable nodes
  cpm(){ const nodes=this.state.items.filter(i=>i.start && i.type!=='goal' && i.type!=='project');
    const set={}; nodes.forEach(n=>set[n.id]=n); const dd=this.G.dayDiff;
    const dur=n=>dd(n.start,n.end); const ES={},EF={};
    const succ={}; nodes.forEach(n=>(n.deps||[]).forEach(d=>{ if(set[d]){ (succ[d]=succ[d]||[]).push(n.id); } }));
    const calcES=(id,seen)=>{ if(ES[id]!=null) return ES[id]; if(seen[id]) return 0; seen[id]=1; const n=set[id]; let es=0; (n.deps||[]).forEach(d=>{ if(set[d]) es=Math.max(es, calcES(d,seen)+dur(set[d])); }); ES[id]=es; EF[id]=es+dur(n); return es; };
    nodes.forEach(n=>calcES(n.id,{}));
    let pend=0; nodes.forEach(n=>pend=Math.max(pend,EF[n.id]));
    const LF={},LS={}; const calcLF=(id,seen)=>{ if(LF[id]!=null) return LF[id]; if(seen[id]) return pend; seen[id]=1; const ss=succ[id]||[]; let lf= ss.length?Infinity:pend; ss.forEach(s=>lf=Math.min(lf, calcLF(s,seen)-dur(set[s]))); if(lf===Infinity) lf=pend; LF[id]=lf; LS[id]=lf-dur(set[id]); return lf; };
    nodes.forEach(n=>calcLF(n.id,{}));

  recalc(items){ const dd=this.G.dayDiff, add=this.G.addDays; const map={}; items.forEach(i=>map[i.id]=i);
    for(let pass=0; pass<60; pass++){ let moved=false;
      items.forEach(it=>{ if(!it.start || !it.deps || !it.deps.length || it.type==='goal'||it.type==='project') return;
        let minStart=null; it.deps.forEach(d=>{ const p=map[d]; if(p&&p.start){ const gap=it.type==='milestone'?0:1; const cand=add(p.end,gap); if(!minStart||dd(minStart,cand)>0)minStart=cand; } });
        if(minStart){ const shift=dd(it.start,minStart); if(shift>0){ it.start=add(it.start,shift); it.end=add(it.end,shift); moved=true; } } });
      if(!moved) break; }
    return items; }

  prioColor(p){ return p==='high'?'var(--copper-500)':p==='medium'?'var(--indigo-400)':'var(--soft)'; }

  set(patch){ this.setState(patch); }
  toggle(id){ this.setState(s=>{ const c=Object.assign({},s.collapsed); c[id]=!c[id]; return {collapsed:c}; }); }

  // ---------- drag ----------
  beginDrag(e,item,mode){ e.preventDefault(); e.stopPropagation(); const px=this.px(); const sx=e.clientX; const os=item.start, oe=item.end; const dd=this.G.dayDiff, add=this.G.addDays;
    const move=ev=>{ const days=Math.round((ev.clientX-sx)/px); this.setState(s=>{ const items=s.items.map(it=>{ if(it.id!==item.id) return it; let ns=os, ne=oe; if(mode==='move'){ ns=add(os,days); ne=add(oe,days); } else if(mode==='l'){ ns=add(os,days); if(dd(ns,oe)<0) ns=oe; } else { ne=add(oe,days); if(dd(os,ne)<0) ne=os; } return Object.assign({},it,{start:ns,end:ne}); }); return {items}; }); };

    window.addEventListener('pointermove',move); window.addEventListener('pointerup',up); this.setState({selected:item.id}); }

  setStatus(id,col){ const map={todo:0,inprog:50,review:90,done:100}; this.setState(s=>({items:s.items.map(it=>it.id===id?Object.assign({},it,{progress:map[col]}):it)})); }

  // ---------- export ----------
  dl(name,blob){ const u=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=u; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(u),1000); }
  rows4export(){ return this.state.items.filter(i=>i.type!=='goal'); }
  expCSV(){ const cols=['id','type','nom','responsable','priorité','début','fin','avancement','dépendances']; const esc=v=>('"'+String(v==null?'':v).replace(/"/g,'""')+'"'); const lines=[cols.join(',')];
    this.rows4export().forEach(i=>{ const g=i.start?{start:i.start,end:i.end,progress:i.progress}:this.geo(i.id); const own=i.owner&&this.OW()[i.owner]?this.OW()[i.owner].name:''; lines.push([i.id,i.type,i.name,own,i.prio||'',g.start,g.end,(g.progress||0)+'%',(i.deps||[]).join(' ')].map(esc).join(',')); });

  expXLS(){ const head=['ID','Type','Nom','Responsable','Priorité','Début','Fin','Avancement','Dépendances']; let t='<table border=1><tr>'+head.map(h=>'<th>'+h+'</th>').join('')+'</tr>';
    this.rows4export().forEach(i=>{ const g=i.start?{start:i.start,end:i.end,progress:i.progress}:this.geo(i.id); const own=i.owner&&this.OW()[i.owner]?this.OW()[i.owner].name:''; t+='<tr>'+[i.id,i.type,i.name,own,i.prio||'',g.start,g.end,(g.progress||0)+'%',(i.deps||[]).join(' ')].map(c=>'<td>'+c+'</td>').join('')+'</tr>'; });
    t+='</table>'; this.dl('mnd-plan.xls', new Blob(['<html><head><meta charset="utf-8"></head><body>'+t+'</body></html>'],{type:'application/vnd.ms-excel'})); this.setState({exportOpen:false}); }

  // ---------- theme vars ----------
  vars(){ const dark=this.state.theme==='dark';
    return dark
    ? {'--bg':'#0A0B1C','--panel':'#131532','--panel2':'#181a3d','--head':'#0f1130','--line':'rgba(246,241,231,0.13)','--line2':'rgba(246,241,231,0.07)','--ink':'#F6F1E7','--soft':'#9AA0C4','--grid':'rgba(246,241,231,0.05)','--weekend':'rgba(246,241,231,0.04)','--track':'#262a55','--bar':'#5B63A8','--barTop':'#8d93cf','--row-hover':'rgba(246,241,231,0.035)','--sel':'rgba(185,122,74,0.5)','--chip':'rgba(246,241,231,0.07)'}
    : {'--bg':'#ECE6DA','--panel':'#FBF8F1','--panel2':'#F2ECE0','--head':'#F6F1E7','--line':'rgba(20,20,27,0.14)','--line2':'rgba(20,20,27,0.07)','--ink':'#14141B','--soft':'#6E6A62','--grid':'rgba(20,20,27,0.05)','--weekend':'rgba(20,20,27,0.035)','--track':'#DAD5E6','--bar':'#3a4180','--barTop':'#1E2150','--row-hover':'rgba(20,20,27,0.035)','--sel':'rgba(185,122,74,0.55)','--chip':'rgba(20,20,27,0.05)'}; }

  // ---------- render ----------
  renderVals(){ this.ROW = (this.props&&this.props.rowHeight)||this.ROW||34; if(!this.state.ready) return { app: this.h('div',{style:{height:'100vh',display:'grid',placeItems:'center',background:'#0A0B1C',color:'#9AA0C4',fontFamily:'var(--font-sans)',letterSpacing:'.2em',fontSize:12}},'CHARGEMENT…') };
    this._byId=this.byId(); this._cm=this.childrenMap(); this._roll={}; this._range=this.range(); this._crit=this.state.critical?this.cpm():{};

  avatar(ownerId,size){ const h=this.h; const o=this.OW()[ownerId]; if(!o) return null; const init=o.name.split(' ').map(w=>w[0]).join('').slice(0,2);
    return h('div',{title:o.name+' · '+o.role,style:{width:size,height:size,borderRadius:'50%',background:o.color,color:'#F6F1E7',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:size*0.4,fontWeight:600,letterSpacing:'.02em',flex:'none',boxShadow:'0 0 0 1.5px var(--panel)'}}, init); }

  caret(open){ return this.h('svg',{width:11,height:11,viewBox:'0 0 11 11',style:{transform:open?'rotate(90deg)':'none',transition:'transform .15s',opacity:.7}}, this.h('path',{d:'M3 1.5L7.5 5.5L3 9.5',stroke:'currentColor',strokeWidth:1.5,fill:'none',strokeLinecap:'round',strokeLinejoin:'round'})); }

  renderApp(){ const h=this.h; const s=this.state;
    return h('div',{style:Object.assign({},this.vars(),{height:'100vh',display:'flex',flexDirection:'column',background:'var(--bg)',color:'var(--ink)',fontFamily:'var(--font-sans)',fontWeight:300})},
      this.topbar(), this.toolbar(),
      h('div',{style:{flex:1,minHeight:0,position:'relative'}},
        s.view==='gantt'?this.gantt():s.view==='kanban'?this.kanban():s.view==='resources'?this.resources():s.view==='resume'?this.summaryView():s.view==='messages'?this.messagesView():s.view==='docs'?this.documents():this.gantt()
      ),

  suggPanel(sugg,label,selN,start){ const h=this.h;
    return h('div',{style:{borderTop:'1px solid var(--line2)',paddingTop:14}},
      h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:9}},
        h('span',{style:{width:20,height:20,borderRadius:'50%',background:'var(--copper-50)',display:'grid',placeItems:'center'}}, h('svg',{width:12,height:12,viewBox:'0 0 24 24',fill:'none',stroke:'var(--copper-600)',strokeWidth:1.8,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M12 3l2 5 5 2-5 2-2 5-2-5-5-2 5-2z'}))),
        h('span',{style:{fontSize:9.5,letterSpacing:'.18em',textTransform:'uppercase',color:'var(--copper-700)',fontWeight:600}},'Assistant MND'),

        h('span',{style:{width:17,height:17,borderRadius:st.type==='milestone'?2:'50%',transform:st.type==='milestone'?'rotate(45deg)':'none',border:'1.5px solid '+(st.on?'var(--accent)':'var(--soft)'),background: st.on?'var(--accent)':'transparent',display:'grid',placeItems:'center',flex:'none'}}, st.on?h('span',{style:{color:'#fff',fontSize:10,transform:st.type==='milestone'?'rotate(-45deg)':'none'}},'\u2713'):null),
        h('div',{style:{flex:1}}, h('span',{style:{fontSize:12.5,color:'var(--ink)'}}, st.name)),

  renderModal(){ const h=this.h; const m=this.state.modal, f=this.state.form; const owners=Object.values(this.OW());
    const titles={ owner:'Nouveau membre', project:'Nouveau projet', task:'Nouvelle tâche', subtask:'Nouvelle sous-tâche' };
    const field=(label,node)=>h('label',{style:{display:'flex',flexDirection:'column',gap:6}},
      h('span',{style:{fontSize:9.5,letterSpacing:'.2em',textTransform:'uppercase',color:'var(--soft)'}},label), node);
    const inp=(k,ph,type)=>h('input',{value:f[k]||'',type:type||'text',placeholder:ph||'',autoFocus:k==='name',onChange:e=>this.setForm(k,e.target.value),

  buildAxis(){ const z=this.state.zoom; const r=this._range; const px=this.px(); const G=this.G; const days=G.dayDiff(r.start,r.end)+1;
    const top=[],bottom=[],grid=[],weekends=[]; const today=G.TODAY;
    // calendar segments helper
    const calSeg=(unit)=>{ const res=[]; let cur=G.parse(r.start); const endMs=G.parse(r.end); const d0=new Date(cur);
      const startUnit=(ms)=>{ const d=new Date(ms); if(unit==='month') return Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),1,12); if(unit==='quarter') return Date.UTC(d.getUTCFullYear(),Math.floor(d.getUTCMonth()/3)*3,1,12); return Date.UTC(d.getUTCFullYear(),0,1,12); };
      const next=(ms)=>{ const d=new Date(ms); if(unit==='month') return Date.UTC(d.getUTCFullYear(),d.getUTCMonth()+1,1,12); if(unit==='quarter') return Date.UTC(d.getUTCFullYear(),Math.floor(d.getUTCMonth()/3)*3+3,1,12); return Date.UTC(d.getUTCFullYear()+1,0,1,12); };

    if(z==='day'){ const months=calSeg('month'); months.forEach(m=>top.push({label:m.label.toUpperCase(),left:m.left,width:m.width})); months.forEach(m=>grid.push({left:m.left,major:true}));
      for(let i=0;i<days;i++){ const iso=G.addDays(r.start,i); const dn=(+iso.split('-')[2]); const dw=G.dow(iso); bottom.push({label:''+dn,left:i*px,width:px,weekend:dw===0||dw===6,today:iso===today}); if(dw===1) grid.push({left:i*px}); } return {top,bottom,grid,weekends,dense:true}; }
    if(z==='week'){ const months=calSeg('month'); months.forEach(m=>{top.push({label:m.label.toUpperCase(),left:m.left,width:m.width}); grid.push({left:m.left,major:true});});
      for(let i=0;i<days;i++){ const iso=G.addDays(r.start,i); if(G.dow(iso)===1){ const dn=(+iso.split('-')[2]); bottom.push({label:dn+' '+this.monShort[(+iso.split('-')[1])-1].toLowerCase(),left:i*px,width:7*px}); grid.push({left:i*px}); } } return {top,bottom,grid,weekends,dense:false}; }
    if(z==='month'){ const yrs=calSeg('year'); yrs.forEach(y=>top.push({label:y.label,left:y.left,width:y.width})); const ms=calSeg('month'); ms.forEach(m=>{ bottom.push({label:this.monShort[ new Date(G.parse(G.addDays(r.start,Math.round(m.left/px)))).getUTCMonth()],left:m.left,width:m.width}); grid.push({left:m.left}); }); return {top,bottom,grid,weekends,dense:true}; }
    if(z==='quarter'){ const yrs=calSeg('year'); yrs.forEach(y=>top.push({label:y.label,left:y.left,width:y.width})); const qs=calSeg('quarter'); qs.forEach(q=>{ bottom.push({label:q.label.split(' ')[0],left:q.left,width:q.width}); grid.push({left:q.left}); }); return {top,bottom,grid,weekends,dense:true}; }
    const yrs=calSeg('year'); yrs.forEach(y=>{ bottom.push({label:y.label,left:y.left,width:y.width}); grid.push({left:y.left,major:true}); }); return {top,bottom,grid,weekends,dense:true}; }
